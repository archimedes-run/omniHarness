# OmniHarness Production Environment
# Usage: make up
#
# Services:
#   - nginx:       Reverse proxy (port 2026, configurable via PORT env var)
#   - frontend:    Next.js production server
#   - gateway:     FastAPI Gateway API + agent runtime
#   - provisioner: (optional) Sandbox provisioner for Kubernetes mode
#
# Key environment variables (set via environment/.env or scripts/deploy.sh):
#   OMNI_HARNESS_PROJECT_ROOT           — project root for relative runtime paths
#   OMNI_HARNESS_HOME                   — runtime data dir, default .omni-harness under $OMNI_HARNESS_PROJECT_ROOT (or cwd)
#   OMNI_HARNESS_CONFIG_PATH            — path to config.yaml
#   OMNI_HARNESS_EXTENSIONS_CONFIG_PATH — path to extensions_config.json
#   OMNI_HARNESS_SKILLS_PATH            — skills dir, default $OMNI_HARNESS_PROJECT_ROOT/skills
#   OMNI_HARNESS_DOCKER_SOCKET          — Docker socket path, default /var/run/docker.sock
#   OMNI_HARNESS_REPO_ROOT              — repo root (used for skills host path in DooD)
#   BETTER_AUTH_SECRET               — required for frontend auth/session security
#
# LangSmith tracing is disabled by default (LANGSMITH_TRACING=false).
# Set LANGSMITH_TRACING=true and LANGSMITH_API_KEY in .env to enable it.
#
# Access: http://localhost:${PORT:-2026}

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: omni-harness-nginx
    ports:
      - "${PORT:-2026}:2026"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
    command: >
      sh -c "cp /etc/nginx/nginx.conf.template /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - frontend
      - gateway
    networks:
      - omni-harness
    restart: unless-stopped

  # ── Frontend: Next.js Production ───────────────────────────────────────────
  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    container_name: omni-harness-frontend
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - OMNI_HARNESS_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
    env_file:
      - ../frontend/.env
    networks:
      - omni-harness
    restart: unless-stopped

  # ── Gateway API ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
        UV_EXTRAS: ${UV_EXTRAS:-}
    container_name: omni-harness-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers ${GATEWAY_WORKERS:-4}"
    volumes:
      - ${OMNI_HARNESS_CONFIG_PATH}:/app/backend/config.yaml:ro
      - ${OMNI_HARNESS_EXTENSIONS_CONFIG_PATH}:/app/backend/extensions_config.json:ro
      - ../skills:/app/skills:ro
      - ${OMNI_HARNESS_HOME}:/app/backend/.omni-harness
      # DooD: AioSandboxProvider starts sandbox containers via host Docker daemon
      - ${OMNI_HARNESS_DOCKER_SOCKET}:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:?HOME must be set}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:?HOME must be set}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    working_dir: /app
    environment:
      - CI=true
      - OMNI_HARNESS_PROJECT_ROOT=/app
      - OMNI_HARNESS_HOME=/app/backend/.omni-harness
      - OMNI_HARNESS_CONFIG_PATH=/app/backend/config.yaml
      - OMNI_HARNESS_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - OMNI_HARNESS_CHANNELS_LANGGRAPH_URL=${OMNI_HARNESS_CHANNELS_LANGGRAPH_URL:-http://gateway:8001/api}
      - OMNI_HARNESS_CHANNELS_GATEWAY_URL=${OMNI_HARNESS_CHANNELS_GATEWAY_URL:-http://gateway:8001}
      # DooD path/network translation
      - OMNI_HARNESS_HOST_BASE_DIR=${OMNI_HARNESS_HOME}
      - OMNI_HARNESS_HOST_SKILLS_PATH=${OMNI_HARNESS_REPO_ROOT}/skills
      - OMNI_HARNESS_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - omni-harness
    restart: unless-stopped

  # ── Sandbox Provisioner (optional, Kubernetes mode) ────────────────────────
  provisioner:
    build:
      context: ./provisioner
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: omni-harness-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      - K8S_NAMESPACE=omni-harness
      - SANDBOX_IMAGE=ghcr.io/archimedes-run/omni-harness-sandbox:latest
      - SKILLS_HOST_PATH=${OMNI_HARNESS_REPO_ROOT}/skills
      - THREADS_HOST_PATH=${OMNI_HARNESS_HOME}/threads
      - KUBECONFIG_PATH=/root/.kube/config
      - NODE_HOST=host.docker.internal
      - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - omni-harness
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
networks:
  omni-harness:
    driver: bridge
